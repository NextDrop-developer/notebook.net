<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дай себе год</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        :root { --bg: #F9F8F3; --text: #1C1C1C; --muted: #8E8E93; --accent: #2F4F4F; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
        }

        .page { 
            display: none; 
            width: 100%; 
            max-width: 420px; 
            margin: 0 auto; 
            min-height: 100vh;
        }
        
        .active { display: block; }

        /* ПЕРВЫЙ СЛАЙД: ОБЫЧНЫЙ ПОТОК (СВЕРХУ ВНИЗ) */
        #step1.active { display: block; }
        #step1 .hero-img { width: 100%; height: auto; max-height: 45vh; object-fit: cover; display: block; }
        #step1 .content { padding: 15px 25px; text-align: center; }

        /* ВСЕ ОСТАЛЬНЫЕ: ЦЕНТРИРОВАНИЕ ЧЕРЕЗ FLEX */
        #step2.active, #step3.active, #step4.active { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        .content { width: 100%; padding: 25px; text-align: center; }

        h1 { font-weight: 300; text-transform: uppercase; letter-spacing: 4px; font-size: 18px; margin-bottom: 10px; }
        .description { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 25px; }

        .btn { 
            background: var(--text); color: #fff; border: none; padding: 18px; width: 100%; 
            font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; 
            cursor: pointer; border-radius: 2px;
        }

        .cards-container { display: flex; flex-direction: column; gap: 12px; text-align: left; width: 100%; }
        .card { background: #fff; padding: 20px; border: 1px solid #eee; border-radius: 2px; cursor: pointer; }
        .price { color: var(--accent); font-weight: 600; font-size: 15px; display: block; margin-bottom: 4px; }
        
        input { 
            width: 100%; border: none; border-bottom: 1px solid #ccc; 
            background: transparent; padding: 12px 0; font-size: 16px; 
            margin-bottom: 20px; outline: none; text-align: left;
        }
    </style>
</head>
<body>

    <div id="step1" class="page active">
        <img src="notepic.jpg" class="hero-img">
        <div class="content">
            <h1>Дай себе год</h1>
            <p class="description">Блокнот для тех, кто ищет гармонию и ясность в каждом дне. Пространство для ваших мыслей.</p>
            <button class="btn" onclick="nextStep(2)">Сделать предзаказ</button>
        </div>
    </div>

    <div id="step2" class="page">
        <div class="content">
            <h1>Издание</h1>
            <div class="cards-container">
                <div class="card" onclick="selectVersion('Color Edition', 49)">
                    <span class="price">49.00 €</span>
                    <h3 style="font-size: 17px;">Color Edition</h3>
                    <p style="font-size: 12px; color: var(--muted); margin-top: 5px;">Цветное оформление и премиум бумага.</p>
                </div>
                <div class="card" onclick="selectVersion('Classic Edition', 39)">
                    <span class="price">39.00 €</span>
                    <h3 style="font-size: 17px;">Classic Edition</h3>
                    <p style="font-size: 12px; color: var(--muted); margin-top: 5px;">Черно-белый минимализм.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="step3" class="page">
        <div class="content">
            <h1>Данные</h1>
            <div style="width: 100%; margin-top: 10px;">
                <input type="text" id="name" placeholder="ИМЯ">
                <input type="email" id="email" placeholder="EMAIL">
                <input type="tel" id="phone" placeholder="ТЕЛЕФОН">
                <button class="btn" onclick="sendData()">Подтвердить</button>
            </div>
        </div>
    </div>

    <div id="step4" class="page">
        <div class="content">
            <span style="font-size: 50px; margin-bottom: 20px; display: block;">🤍</span>
            <h1>Merci</h1>
            <p class="description">Заказ принят. Проверьте почту.</p>
            <button class="btn" onclick="tg.close()">Закрыть</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let order = { version: '' };

        function nextStep(s) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            window.scrollTo(0,0);
        }

        function selectVersion(v, p) {
            order.version = v;
            nextStep(3);
        }

        function sendData() {
            const n = document.getElementById('name').value;
            const e = document.getElementById('email').value;
            const p = document.getElementById('phone').value;
            if(!n || !e || !p) { tg.showAlert("Заполните все поля"); return; }
            tg.sendData(JSON.stringify({name: n, email: e, phone: p, version: order.version}));
            nextStep(4);
        }
    </script>
</body>
</html>
