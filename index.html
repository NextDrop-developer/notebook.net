<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дай себе год</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        :root { --bg: #F9F8F3; --text: #1C1C1C; --accent: #2F4F4F; --muted: #8E8E93; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .page { display: none; width: 100%; max-width: 420px; animation: fadeIn 0.4s ease; box-sizing: border-box; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hero-img { width: 100%; height: auto; display: block; }
        .content { padding: 30px; text-align: center; }
        h1 { font-weight: 300; text-transform: uppercase; letter-spacing: 4px; font-size: 20px; }
        .description { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 30px; }
        .card { background: #fff; padding: 25px; margin-bottom: 15px; border: 1px solid #eee; text-align: left; cursor: pointer; }
        .price { color: var(--accent); font-weight: 600; display: block; margin-bottom: 5px; }
        .btn { background: var(--text); color: #fff; border: none; padding: 20px; width: 100%; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 20px; }
        input { width: 100%; border: none; border-bottom: 1px solid #ccc; background: transparent; padding: 12px 0; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input:focus { border-bottom: 1px solid var(--text); }
    </style>
</head>
<body>

    <div id="step1" class="page active">
        <img src="notepic.jpg" class="hero-img"> <div class="content">
            <h1>Дай себе год</h1>
            <p class="description">Блокнот, который поможет найти ответы внутри себя.</p>
            <button class="btn" onclick="nextStep(2)">Начать</button>
        </div>
    </div>

    <div id="step2" class="page">
        <div class="content">
            <h1>Издание</h1>
            <div class="card" onclick="selectVersion('Color Edition', 49)">
                <h3>Color Edition</h3>
                <span class="price">49.00 €</span>
                <p style="font-size: 12px; color: var(--muted); margin: 0;">Цветные иллюстрации, твердый переплет.</p>
            </div>
            <div class="card" onclick="selectVersion('Classic Edition', 39)">
                <h3>Classic Edition</h3>
                <span class="price">39.00 €</span>
                <p style="font-size: 12px; color: var(--muted); margin: 0;">Черно-белый стиль, мягкий минимализм.</p>
            </div>
        </div>
    </div>

    <div id="step3" class="page">
        <div class="content">
            <h1>Детали</h1>
            <input type="text" id="name" placeholder="ВАШЕ ИМЯ">
            <input type="email" id="email" placeholder="EMAIL">
            <input type="tel" id="phone" placeholder="ТЕЛЕФОН">
            <button class="btn" onclick="sendData()">Подтвердить</button>
        </div>
    </div>

    <div id="step4" class="page">
        <div class="content" style="padding-top: 60px;">
            <span style="font-size: 50px;">🤍</span>
            <h1>Merci</h1>
            <p class="description">Предзаказ принят. Подробности уже на вашей почте.</p>
            <button class="btn" onclick="tg.close()">Закрыть</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let order = { version: '', price: 0 };

        function nextStep(s) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            window.scrollTo(0,0);
        }

        function selectVersion(v, p) {
            order.version = v; order.price = p;
            nextStep(3);
        }

        function sendData() {
            const n = document.getElementById('name').value;
            const e = document.getElementById('email').value;
            const p = document.getElementById('phone').value;

            if(!n || !e || !p) { tg.showAlert("Заполните все поля"); return; }

            const result = { name: n, email: e, phone: p, version: order.version };
            tg.sendData(JSON.stringify(result));
            nextStep(4);
        }
    </script>
</body>
</html>
